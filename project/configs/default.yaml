data:
  source: "auto"            # "stooq" | "yfinance" | "auto" (try stooq then yfinance)
  start: "2010-01-01"
  end: "2024-12-31"
  force_refresh: false
  min_history_days: 252
  min_tickers: 20
  retries: 3

universe:
  fallback: "sp500"

features:
  winsorize_limits: [0.01, 0.99]
  normalize: "zscore"

labels:
  horizon_days: 21

model:
  type: "ridge"
  alpha: 1.0
  l1_ratio: 0.5
  min_train_samples: 2000

backtest:
  rebalance_freq: "M"
  train_lookback_months: 36

portfolio:
  long_short_quantile: 0.10
  gross_leverage: 2.0
  max_weight: 0.02
  beta_tolerance: 0.05
  beta_window: 252
  cov_window: 252
  risk_aversion: 5.0
  turnover_penalty: 0.1
  solver: "CLARABEL"

costs:
  commission_bps: 1.0
  slippage_bps: 2.0
